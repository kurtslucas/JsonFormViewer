<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>{}</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Form Viewer</title>
<style>
  :root {
    --bg-page: #f5f7fa; --bg-panel: #ffffff; --bg-muted: #f0f2f5;
    --border-color: #d1d5db; --text-primary: #1f2937; --text-secondary: #6b7280;
    --text-tertiary: #9ca3af; --text-quaternary: #d1d5db;
    --accent-blue: #2563eb; --accent-green: #16a34a; --accent-red: #dc2626;
    --accent-orange: #ea580c; --accent-purple: #8b5cf6;
    --font-sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --font-mono: "SF Mono","Fira Code","Cascadia Code",Consolas,monospace;
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page: #111827; --bg-panel: #1f2937; --bg-muted: #374151;
      --border-color: #4b5563; --text-primary: #f9fafb; --text-secondary: #d1d5db;
      --text-tertiary: #9ca3af; --text-quaternary: #6b7280;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--bg-page); color: var(--text-primary); padding: 16px; min-height: 100vh; }
  .wrap { max-width: 1400px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 20px; font-weight: 600; }
  .top-bar h1 span { color: var(--accent-blue); }
  .btn { padding: 8px 16px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-panel); color: var(--text-primary); cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.15s ease-out; }
  .btn:hover { background: var(--bg-muted); }
  .btn-primary { background: var(--text-primary); color: var(--bg-panel); border-color: var(--text-primary); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { color: var(--accent-red); border-color: var(--accent-red); }
  .btn-danger:hover { background: rgba(220,38,38,0.08); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-report { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
  .btn-report:hover { opacity: 0.85; background: var(--accent-blue); }
  .json-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 0; }
  .json-tab { padding: 8px 16px; border: 1px solid var(--border-color); border-bottom: none; border-radius: var(--radius-md) var(--radius-md) 0 0; background: var(--bg-muted); cursor: pointer; font-size: 13px; position: relative; display: flex; align-items: center; gap: 8px; transition: all 0.15s ease-out; color: var(--text-secondary); max-width: 200px; }
  .json-tab:hover { background: var(--bg-panel); color: var(--text-primary); }
  .json-tab.active { background: var(--bg-panel); color: var(--text-primary); border-top: 3px solid var(--accent-blue); font-weight: 600; }
  .json-tab .tab-close { opacity: 0; transition: opacity 0.15s; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; color: var(--text-tertiary); flex-shrink: 0; }
  .json-tab:hover .tab-close { opacity: 1; }
  .tab-close:hover { background: rgba(220,38,38,0.12); color: var(--accent-red); }
  .add-tab-btn { padding: 8px 14px; border: 1px dashed var(--border-color); border-radius: var(--radius-md); background: transparent; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all 0.15s; margin-bottom: 1px; }
  .add-tab-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
  .tab-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-lg); background: var(--bg-muted); }
  .sum-item { display: flex; flex-direction: column; gap: 3px; }
  .sum-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.02em; }
  .sum-value { font-size: 14px; font-weight: 600; word-break: break-word; }
  .sum-value.money { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
  .inner-tabs { display: flex; gap: 2px; margin-bottom: 0; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
  .inner-tab { padding: 10px 18px; border: none; background: transparent; cursor: pointer; font-size: 13px; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all 0.15s; font-family: inherit; }
  .inner-tab:hover { color: var(--text-primary); }
  .inner-tab.active { color: var(--text-primary); border-bottom-color: var(--accent-blue); font-weight: 600; }
  .inner-content { display: none; padding: 20px 0; }
  .inner-content.active { display: block; }
  .fieldset { border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; background: var(--bg-panel); }
  .fieldset-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
  .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .data-item { display: flex; flex-direction: column; gap: 3px; }
  .data-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.02em; }
  .data-value { font-size: 13px; color: var(--text-primary); word-break: break-word; min-height: 20px; line-height: 1.4; }
  .data-value.null { color: var(--text-quaternary); font-style: italic; }
  .array-table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; }
  .array-table th, .array-table td { border: 1px solid var(--border-color); padding: 10px 12px; text-align: left; }
  .array-table th { background: var(--bg-muted); font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.02em; }
  .array-table tr:hover { background: var(--bg-muted); }
  .array-table td .null { color: var(--text-quaternary); font-style: italic; }
  .array-table td .bool-true { color: var(--accent-green); font-weight: 600; }
  .array-table td .bool-false { color: var(--accent-red); font-weight: 600; }
  .array-table td .money { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
  .empty-state svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: 0.35; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .empty-state-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
  .empty-state-sub { font-size: 14px; }
  .drop-zone { border: 2px dashed var(--border-color); border-radius: var(--radius-lg); padding: 32px; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 16px; background: var(--bg-panel); }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent-blue); background: var(--bg-muted); }
  .drop-zone-text { font-size: 15px; color: var(--text-secondary); font-weight: 500; }
  .drop-zone-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }
  input[type="file"] { display: none; }
  .json-input { width: 100%; min-height: 140px; border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 14px; font-family: var(--font-mono); font-size: 12px; resize: vertical; background: var(--bg-panel); color: var(--text-primary); line-height: 1.5; }
  .json-input:focus { outline: none; border-color: var(--accent-blue); }
  .json-input::placeholder { color: var(--text-quaternary); }
  .actions-row { display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end; flex-wrap: wrap; }
  .nested-object { border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; background: var(--bg-panel); }
  .bool-true { color: var(--accent-green); font-weight: 600; }
  .bool-false { color: var(--accent-red); font-weight: 600; }
  .export-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 16px; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius-lg); background: var(--text-primary); color: var(--bg-panel); font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.15); opacity: 0; transform: translateY(12px); transition: all 0.3s ease; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .report-header { text-align: center; padding: 24px 16px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; background: var(--bg-panel); border-radius: var(--radius-lg); }
  .report-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .report-header .report-meta { font-size: 12px; color: var(--text-tertiary); }
  .report-footer { text-align: center; padding: 20px; margin-top: 32px; border-top: 1px solid var(--border-color); font-size: 11px; color: var(--text-quaternary); }
  .export-actions { text-align: center; margin-bottom: 20px; }
  .stats-bar { display: flex; gap: 16px; font-size: 12px; color: var(--text-tertiary); margin-bottom: 12px; flex-wrap: wrap; }
  .stats-bar span { background: var(--bg-muted); padding: 4px 12px; border-radius: var(--radius-sm); }
  @media (max-width: 640px) { .summary-bar { grid-template-columns: repeat(2, 1fr); } .data-grid { grid-template-columns: 1fr; } .top-bar { flex-direction: column; align-items: flex-start; } .json-tabs { overflow-x: auto; flex-wrap: nowrap; } .json-tab { white-space: nowrap; } }

  /* ===== DUPLA CLICAR PARA COPIAR ===== */
  .nested-object, .fieldset {
    position: relative;
    cursor: pointer;
    transition: box-shadow 0.15s ease;
  }
  .nested-object:hover, .fieldset:hover {
    box-shadow: 0 0 0 2px var(--accent-blue);
  }
  .nested-object::after, .fieldset::after {
    content: "Duplo clique para copiar";
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 10px;
    color: var(--text-tertiary);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
    background: var(--bg-panel);
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-color);
    z-index: 10;
  }
  .nested-object:hover::after, .fieldset:hover::after {
    opacity: 1;
  }
  /* Evita tooltip em elementos que nao sao copiaveis */
  .drop-zone, .json-input, .actions-row, .export-bar, .summary-bar, .inner-tabs, .stats-bar, .report-header, .report-footer, .empty-state, .modal-box, .toast, .data-item {
    cursor: default !important;
  }
  .drop-zone::after, .json-input::after, .actions-row::after, .export-bar::after, .summary-bar::after, .inner-tabs::after, .stats-bar::after, .report-header::after, .report-footer::after, .empty-state::after, .modal-box::after, .toast::after, .data-item::after {
    display: none !important;
  }

  /* ===== MODAL DE VISUALIZACAO JSON ===== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s ease;
  }
  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }
  .modal-box {
    background: var(--bg-panel);
    border-radius: var(--radius-lg);
    width: 90%;
    max-width: 90%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: scale(0.95);
    transition: transform 0.2s ease;
  }
  .modal-overlay.active .modal-box {
    transform: scale(1);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color);
  }
  .modal-header h3 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-close {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .modal-close:hover {
    background: var(--bg-muted);
    color: var(--text-primary);
  }
  .modal-body {
    flex: 1;
    overflow: auto;
    padding: 0;
  }
  .modal-footer {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border-color);
    justify-content: flex-end;
  }
  .json-code {
    margin: 0;
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    white-space: pre;
    background: #1e1e2e;
    color: #cdd6f4;
    min-height: 200px;
    display: inline-block;
    min-width: 100%;
  }
  .json-code .key { color: #f38ba8; }
  .json-code .string { color: #a6e3a1; }
  .json-code .number { color: #fab387; }
  .json-code .boolean { color: #89b4fa; font-weight: 600; }
  .json-code .null { color: #cba6f7; font-style: italic; }
</style>

<body>
<div class="wrap" id="app">
  <div class="top-bar">
    <h1><span>{ }</span> JSON Form Viewer</h1>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-sm" onclick="exportAll()">Exportar todos</button>
      <button class="btn btn-danger btn-sm" onclick="clearAll()">Limpar tudo</button>
    </div>
  </div>
  <div class="json-tabs" id="jsonTabs"></div>
  <div id="jsonContainer"></div>
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <div class="empty-state-title">Nenhum JSON carregado</div>
    <div class="empty-state-sub">Clique em "+ Novo JSON" para adicionar ou arraste um arquivo.</div>
  </div>
  <div style="border-top:1px solid var(--border-color);margin-top:32px;padding-top:14px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--text-quaternary);">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    <span>Dados armazenados apenas no navegador deste dispositivo</span>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="jsonModal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>👁 Visualizar JSON</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <pre class="json-code" id="modalJsonContent"></pre>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="copyModalJSON()">📋 Copiar</button>
      <button class="btn btn-primary btn-sm" onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
var STORAGE_KEY = 'json_viewer_docs_v1';
var STATE_KEY = 'json_viewer_state_v1';
var docs = [];
var activeDocId = null;
var activeInnerTabs = {};
var currentModalJSON = '';

function fmtVal(v, key) {
  if (v === null || v === undefined) return '<span class="data-value null">null</span>';
  if (typeof v === 'boolean') return '<span class="data-value">' + v + '</span>';
  return '<span class="data-value">' + escapeHtml(String(v)) + '</span>';
}

function escapeHtml(t) {
  if (t === null || t === undefined) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function genId() { return 'doc_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

function getDocLabel(o) {
  if (o.name) return o.name;
  if (o.title) return o.title;
  if (o.id) return String(o.id);
  if (o._fileName) return o._fileName;
  return 'JSON ' + o._id.slice(-6);
}

function loadDocs() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) docs = JSON.parse(raw);
  } catch(e) { docs = []; }
  try {
    var stateRaw = localStorage.getItem(STATE_KEY);
    if (stateRaw) {
      var state = JSON.parse(stateRaw);
      if (state.activeDocId) activeDocId = state.activeDocId;
      if (state.activeInnerTabs) activeInnerTabs = state.activeInnerTabs;
    }
  } catch(e) {}
  renderTabs();
  if (docs.length > 0 && !activeDocId) activeDocId = docs[0]._id;
  if (activeDocId && !docs.some(function(d) { return d._id === activeDocId; })) {
    activeDocId = docs.length ? docs[0]._id : null;
  }
  renderContent();
}

function saveDocs() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(docs)); } catch(e) {}
}

function saveState() {
  try {
    var state = { activeDocId: activeDocId, activeInnerTabs: activeInnerTabs };
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function renderTabs() {
  var container = document.getElementById('jsonTabs');
  var html = '';
  docs.forEach(function(d) {
    var label = getDocLabel(d);
    var isActive = d._id === activeDocId;
    html += '<div class="json-tab ' + (isActive ? 'active' : '') + '" data-id="' + d._id + '" onclick="switchDoc(\'' + d._id + '\')">' +
      '<span class="tab-label">' + escapeHtml(label) + '</span>' +
      '<span class="tab-close" onclick="event.stopPropagation();removeDoc(\'' + d._id + '\')">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
      '</span></div>';
  });
  html += '<button class="add-tab-btn" onclick="showAddPanel()">+ Novo JSON</button>';
  container.innerHTML = html;
  var empty = document.getElementById('emptyState');
  empty.style.display = docs.length > 0 ? 'none' : 'block';
}

function switchDoc(id) {
  activeDocId = id;
  saveState();
  renderTabs();
  renderContent();
}

function removeDoc(id) {
  docs = docs.filter(function(d) { return d._id !== id; });
  if (activeDocId === id) activeDocId = docs.length ? docs[0]._id : null;
  if (activeInnerTabs[id]) delete activeInnerTabs[id];
  saveDocs();
  saveState();
  renderTabs();
  renderContent();
  showToast('JSON removido');
}

function showAddPanel() {
  activeDocId = '__new__';
  renderTabs();
  renderContent();
}

function addDocFromText() {
  var el = document.getElementById('jsonInput');
  var text = el.value.trim();
  if (!text) return;
  try {
    var data = JSON.parse(text);
    var newDoc = {};
    for (var k in data) { newDoc[k] = data[k]; }
    newDoc._id = genId();
    docs.push(newDoc);
    activeDocId = newDoc._id;
    saveDocs();
    saveState();
    renderTabs();
    renderContent();
    showToast('JSON carregado com sucesso!');
  } catch(e) { alert('Erro ao parsear JSON: ' + e.message); }
}

function addDocFromFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var newDoc = {};
      for (var k in data) { newDoc[k] = data[k]; }
      newDoc._id = genId();
      newDoc._fileName = file.name.replace(/\.json$/i, '');
      docs.push(newDoc);
      activeDocId = newDoc._id;
      saveDocs();
      saveState();
      renderTabs();
      renderContent();
      showToast('JSON carregado com sucesso!');
    } catch(err) { alert('Erro ao ler JSON: ' + err.message); }
  };
  reader.readAsText(file);
}

function exportDoc(id) {
  var d = docs.find(function(x) { return x._id === id; });
  if (!d) return;
  var clean = {};
  for (var k in d) { if (k !== '_id' && k !== '_fileName') clean[k] = d[k]; }
  var blob = new Blob([JSON.stringify(clean, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (d._fileName || 'json') + '_' + d._id.slice(-6) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('JSON exportado!');
}

function copyJSON(id) {
  var d = docs.find(function(x) { return x._id === id; });
  if (!d) return;
  var clean = {};
  for (var k in d) { if (k !== '_id' && k !== '_fileName') clean[k] = d[k]; }
  var jsonStr = JSON.stringify(clean, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(jsonStr).then(function() {
      showToast('JSON copiado para a área de transferência!');
    }, function() {
      fallbackCopy(jsonStr);
    });
  } else {
    fallbackCopy(jsonStr);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('JSON copiado para a área de transferência!');
  } catch(e) {
    showToast('Não foi possível copiar automaticamente');
  }
  document.body.removeChild(ta);
}

// ===== FUNCOES DO MODAL =====

function openModal(id) {
  var d = docs.find(function(x) { return x._id === id; });
  if (!d) return;
  var clean = {};
  for (var k in d) { if (k !== '_id' && k !== '_fileName') clean[k] = d[k]; }
  currentModalJSON = JSON.stringify(clean, null, 2);
  var highlighted = highlightJSON(currentModalJSON);
  document.getElementById('modalJsonContent').innerHTML = highlighted;
  document.getElementById('jsonModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('jsonModal').classList.remove('active');
  document.body.style.overflow = '';
}

function copyModalJSON() {
  if (!currentModalJSON) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentModalJSON).then(function() {
      showToast('JSON copiado!');
    }, function() {
      fallbackCopy(currentModalJSON);
    });
  } else {
    fallbackCopy(currentModalJSON);
  }
}

function highlightJSON(jsonStr) {
  return escapeHtml(jsonStr)
    .replace(/"([^"\\]*(\\.[^"\\]*)*)":/g, '<span class="key">"$1":</span>')
    .replace(/: "([^"\\]*(\\.[^"\\]*)*)"/g, ': <span class="string">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span class="number">$1</span>')
    .replace(/: (true|false)/g, ': <span class="boolean">$1</span>')
    .replace(/: (null)/g, ': <span class="null">$1</span>');
}

function exportAll() {
  if (docs.length === 0) { showToast('Nenhum JSON para exportar'); return; }
  var all = docs.map(function(d) {
    var c = {};
    for (var k in d) { if (k !== '_id' && k !== '_fileName') c[k] = d[k]; }
    return c;
  });
  var blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'jsons_exportados.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(docs.length + ' JSONs exportados!');
}

function clearAll() {
  if (!confirm('Tem certeza que deseja remover TODOS os JSONs?')) return;
  docs = [];
  activeDocId = null;
  activeInnerTabs = {};
  saveDocs();
  saveState();
  renderTabs();
  renderContent();
  showToast('Todos os JSONs removidos');
}

function renderContent() {
  var container = document.getElementById('jsonContainer');
  if (activeDocId === '__new__') {
    container.innerHTML =
      '<div style="margin-bottom:12px;">' +
        '<div class="drop-zone" id="dropZone">' +
          '<div class="drop-zone-text">Arraste e solte um arquivo JSON aqui</div>' +
          '<div class="drop-zone-sub">ou cole o JSON abaixo</div>' +
        '</div>' +
        '<input type="file" id="fileInput" accept=".json" onchange="handleFileSelect(event)">' +
        '<textarea class="json-input" id="jsonInput" placeholder="Cole aqui o JSON..."></textarea>' +
        '<div class="actions-row">' +
          '<button class="btn" onclick="document.getElementById(\'fileInput\').click()">Selecionar arquivo</button>' +
          '<button class="btn btn-primary" onclick="addDocFromText()">Carregar JSON</button>' +
        '</div>' +
      '</div>';
    setupDropZone();
    return;
  }
  var o = docs.find(function(x) { return x._id === activeDocId; });
  if (!o) { container.innerHTML = ''; return; }
  renderGeneric(o, container);
  if (activeDocId && activeDocId !== '__new__' && activeInnerTabs[activeDocId]) {
    var savedTab = activeInnerTabs[activeDocId];
    var tabExists = document.querySelector('.inner-tab[data-tab="' + savedTab + '"]');
    if (tabExists) switchInnerTab(savedTab);
  }
  // Ativa duplo clique em objetos e arrays renderizados
  setTimeout(function() { setupDoubleClick(); }, 0);
}

function renderGeneric(o, container) {
  var keys = Object.keys(o).filter(function(k) { return k !== '_id' && k !== '_fileName'; });
  var isArrayFirst = keys.length === 1 && Array.isArray(o[keys[0]]);
  var stats = computeStats(o);
  var statsHtml = '<div class="stats-bar">' +
    '<span>\uD83D\uDCE6 ' + keys.length + ' chaves no raiz</span>' +
    '<span>\uD83D\uDD22 ' + stats.totalArrays + ' arrays</span>' +
    '<span>\uD83D\uDCC1 ' + stats.totalObjects + ' objetos</span>' +
    '<span>\uD83D\uDCDD ' + stats.totalPrimitives + ' primitivos</span>' +
    '<span>\u3030 ' + stats.maxDepth + ' niveis de profundidade</span>' +
  '</div>';
  var summaryHtml = '<div class="summary-bar">';
  if (isArrayFirst) {
    var arrKey = keys[0];
    var arr = o[arrKey];
    summaryHtml += '<div class="sum-item"><span class="sum-label">estrutura</span><span class="sum-value">Array: ' + escapeHtml(arrKey) + '</span></div>';
    summaryHtml += '<div class="sum-item"><span class="sum-label">itens</span><span class="sum-value">' + arr.length + '</span></div>';
    if (arr.length > 0 && typeof arr[0] === 'object') {
      summaryHtml += '<div class="sum-item"><span class="sum-label">campos</span><span class="sum-value">' + Object.keys(arr[0]).join(', ') + '</span></div>';
    }
  } else {
    var summaryFields = pickSummaryFields(o);
    summaryFields.forEach(function(f) {
      summaryHtml += '<div class="sum-item"><span class="sum-label">' + escapeHtml(f.key) + '</span>' + fmtVal(f.value, f.key) + '</div>';
    });
  }
  summaryHtml += '</div>' +
    '<div class="export-bar"><button class="btn btn-sm btn-report" onclick="exportReport(\'' + o._id + '\')">\uD83D\uDCC4 Exportar Relatorio</button><button class="btn btn-sm" onclick="openModal(\'' + o._id + '\')">\uD83D\uDC41 Visualizar JSON</button><button class="btn btn-sm" onclick="copyJSON(\'' + o._id + '\')">\uD83D\uDCCB Copiar JSON</button><button class="btn btn-sm" onclick="exportDoc(\'' + o._id + '\')">Exportar JSON</button></div>';
  var simpleFields = [], arrayFields = [], objectFields = [];
  keys.forEach(function(k) {
    classifyField(k, o[k], simpleFields, arrayFields, objectFields);
  });
  var tabDefs = [];
  if (isArrayFirst) {
    tabDefs.push({id: 'main_array', label: escapeHtml(keys[0]) + ' (' + o[keys[0]].length + ')'});
  } else {
    if (simpleFields.length) {
      tabDefs.push({id: 'geral', label: 'Geral'});
    }
  }
  objectFields.forEach(function(f) { tabDefs.push({id: 'obj_' + f.key, label: f.key}); });
  if (!isArrayFirst) {
    arrayFields.forEach(function(f) { tabDefs.push({id: 'arr_' + f.key, label: f.key + ' (' + f.value.length + ')'}); });
  }
  var firstTabId = tabDefs.length > 0 ? tabDefs[0].id : null;
  var innerTabsHtml = '<div class="inner-tabs">';
  tabDefs.forEach(function(t, i) {
    innerTabsHtml += '<button class="inner-tab ' + (i===0?'active':'') + '" data-tab="' + t.id + '" onclick="switchInnerTab(\'' + t.id + '\')">' + t.label + '</button>';
  });
  innerTabsHtml += '</div>';
  
  // Identificar qual campo já foi renderizado no conteúdo inicial
  var firstObjKey = null;
  var firstArrKey = null;
  
  var contentsHtml = '';
  if (isArrayFirst) {
    var arrKey = keys[0];
    var arr = o[arrKey];
    contentsHtml += '<div class="inner-content active" data-content="main_array">';
    contentsHtml += renderGenericArray(arr, arrKey, arrKey);
    contentsHtml += '</div>';
    if (simpleFields.length || objectFields.length > 0) {
      tabDefs.push({id: 'geral', label: 'Outros campos'});
      contentsHtml += '<div class="inner-content" data-content="geral">';
      contentsHtml += renderGenericFields(simpleFields, objectFields, '');
      contentsHtml += '</div>';
    }
  } else {
    if (tabDefs.length > 0 && tabDefs[0].id === 'geral') {
      // Aba Geral é a primeira: nenhum objectField/arrayField foi pré-renderizado
      contentsHtml += '<div class="inner-content active" data-content="geral">';
      contentsHtml += renderGenericFields(simpleFields, []);
      contentsHtml += '</div>';
    } else if (tabDefs.length > 0) {
      // A primeira aba é um objectField ou arrayField — precisamos identificar qual
      contentsHtml += '<div class="inner-content active" data-content="' + tabDefs[0].id + '">';
      if (tabDefs[0].id.indexOf('obj_') === 0) {
        var objKey = tabDefs[0].id.replace('obj_', '');
        firstObjKey = objKey; // ← marca para pular no loop posterior
        var objField = objectFields.find(function(f) { return f.key === objKey; });
        if (objField) {
          contentsHtml += '<div class="fieldset" data-json-path="' + escapeHtml(objField.key) + '"><div class="fieldset-title">' + escapeHtml(objField.key) + '</div>';
          contentsHtml += renderGenericObject(objField.value, objField.key, objField.key);
          contentsHtml += '</div>';
        }
      } else if (tabDefs[0].id.indexOf('arr_') === 0) {
        var arrKey2 = tabDefs[0].id.replace('arr_', '');
        firstArrKey = arrKey2; // ← marca para pular no loop posterior
        var arrField = arrayFields.find(function(f) { return f.key === arrKey2; });
        if (arrField) {
          contentsHtml += renderGenericArray(arrField.value, arrField.key, arrField.key);
        }
      }
      contentsHtml += '</div>';
    }
  }
  
  // Pular o campo já renderizado no conteúdo inicial
  objectFields.forEach(function(f) {
    if (firstObjKey && f.key === firstObjKey) return; // pula se já foi renderizado
    contentsHtml += '<div class="inner-content" data-content="obj_' + f.key + '">';
    contentsHtml += '<div class="fieldset" data-json-path="' + escapeHtml(f.key) + '"><div class="fieldset-title">' + escapeHtml(f.key) + '</div>';
    contentsHtml += renderGenericObject(f.value, f.key, f.key);
    contentsHtml += '</div></div>';
  });
  
  if (!isArrayFirst) {
    arrayFields.forEach(function(f) {
      if (firstArrKey && f.key === firstArrKey) return; // pula se já foi renderizado
      contentsHtml += '<div class="inner-content" data-content="arr_' + f.key + '">';
      contentsHtml += renderGenericArray(f.value, f.key, f.key);
      contentsHtml += '</div>';
    });
  }
  
  container.innerHTML = statsHtml + summaryHtml + innerTabsHtml + contentsHtml;
}

function computeStats(obj, depth) {
  depth = depth || 0;
  var stats = { totalArrays: 0, totalObjects: 0, totalPrimitives: 0, maxDepth: depth };
  function traverse(o, d) {
    stats.maxDepth = Math.max(stats.maxDepth, d);
    if (Array.isArray(o)) {
      stats.totalArrays++;
      o.forEach(function(item) {
        if (item !== null && typeof item === 'object') traverse(item, d + 1);
        else stats.totalPrimitives++;
      });
    } else if (typeof o === 'object' && o !== null) {
      stats.totalObjects++;
      Object.keys(o).forEach(function(k) {
        if (k === '_id' || k === '_fileName') return;
        var v = o[k];
        if (v !== null && typeof v === 'object') traverse(v, d + 1);
        else stats.totalPrimitives++;
      });
    } else {
      stats.totalPrimitives++;
    }
  }
  traverse(obj, depth);
  return stats;
}

function classifyField(k, v, simpleFields, arrayFields, objectFields) {
  if (v === null || v === undefined || typeof v === 'boolean' || typeof v === 'number' || typeof v === 'string') {
    simpleFields.push({key: k, value: v});
  } else if (Array.isArray(v)) {
    if (v.length === 0) { simpleFields.push({key: k, value: '[] (vazio)'}); }
    else { arrayFields.push({key: k, value: v}); }
  } else if (typeof v === 'object') { objectFields.push({key: k, value: v}); }
}

function renderGenericFields(simpleFields, objectFields, jsonPath) {
  jsonPath = jsonPath || '';
  var html = '';
  if (simpleFields.length) {
    html += '<div class="fieldset"><div class="fieldset-title">campos</div><div class="data-grid">';
    simpleFields.forEach(function(f) { html += '<div class="data-item"><span class="data-label">' + escapeHtml(f.key) + '</span>' + fmtVal(f.value, f.key) + '</div>'; });
    html += '</div></div>';
  }
  if (objectFields.length) {
    objectFields.forEach(function(f) {
      var objPath = jsonPath ? jsonPath + '.' + f.key : f.key;
      html += '<div class="fieldset" data-json-path="' + escapeHtml(objPath) + '"><div class="fieldset-title">' + escapeHtml(f.key) + '</div>';
      html += renderGenericObject(f.value, f.key, objPath);
      html += '</div>';
    });
  }
  return html;
}

function renderGenericArray(arr, label, jsonPath) {
  jsonPath = jsonPath || label;
  if (!arr || arr.length === 0) {
    return '<div class="empty-state">Nenhum item em ' + escapeHtml(label) + '.</div>';
  }
  var html = '';
  arr.forEach(function(item, idx) {
    var itemPath = jsonPath + '.' + idx;
    if (typeof item === 'object' && item !== null) {
      html += '<div class="fieldset" data-json-path="' + escapeHtml(itemPath) + '"><div class="fieldset-title">' + escapeHtml(label) + ' ' + (idx+1);
      if (item.name) html += ' \u2014 ' + escapeHtml(String(item.name));
      else if (item.title) html += ' \u2014 ' + escapeHtml(String(item.title));
      else if (item.id) html += ' (id: ' + escapeHtml(String(item.id)) + ')';
      html += '</div>';
      html += renderGenericObject(item, label, itemPath);
      html += '</div>';
    } else {
      html += '<div class="fieldset" data-json-path="' + escapeHtml(itemPath) + '"><div class="fieldset-title">' + escapeHtml(label) + ' ' + (idx+1) + '</div>';
      html += '<div class="data-grid"><div class="data-item"><span class="data-label">valor</span>' + fmtVal(item, 'valor') + '</div></div>';
      html += '</div>';
    }
  });
  return html;
}

function renderGenericObject(obj, parentKey, jsonPath) {
  jsonPath = jsonPath || parentKey;
  var html = '<div class="data-grid">';
  Object.keys(obj).forEach(function(k) {
    var v = obj[k];
    var propPath = jsonPath + '.' + k;
    if (v === null || v === undefined) {
      html += '<div class="data-item"><span class="data-label">' + escapeHtml(k) + '</span>' + fmtVal(v, k) + '</div>';
    } else if (typeof v === 'boolean') {
      html += '<div class="data-item"><span class="data-label">' + escapeHtml(k) + '</span>' + fmtVal(v, k) + '</div>';
    } else if (typeof v === 'number') {
      html += '<div class="data-item"><span class="data-label">' + escapeHtml(k) + '</span>' + fmtVal(v, k) + '</div>';
    } else if (typeof v === 'string') {
      html += '<div class="data-item"><span class="data-label">' + escapeHtml(k) + '</span>' + fmtVal(v, k) + '</div>';
    } else if (Array.isArray(v)) {
      if (v.length === 0) {
        html += '<div class="data-item" style="grid-column:1/-1;"><span class="data-label">' + escapeHtml(k) + '</span><span class="data-value null">[] (vazio)</span></div>';
      } else if (v.every(function(item) { return item !== null && typeof item === 'object'; })) {
        // Array de objetos - renderiza cada objeto como fieldset aninhado
        html += '<div class="data-item" style="grid-column:1/-1;"><span class="data-label">' + escapeHtml(k) + ' (' + v.length + ' itens)</span>';
        v.forEach(function(subItem, subIdx) {
          var subTitle = subItem.nome || subItem.name || subItem.title || subItem.id || subItem.rota || subItem.bucket || subItem.codigo || ('Item ' + (subIdx + 1));
          var subPath = propPath + '.' + subIdx;
          html += '<div class="nested-object" data-json-path="' + escapeHtml(subPath) + '" style="margin-top:8px;">';
          html += '<div class="fieldset-title" style="font-size:13px;padding-bottom:6px;margin-bottom:10px;">' + escapeHtml(subTitle) + '</div>';
          html += renderGenericObject(subItem, k, subPath);
          html += '</div>';
        });
        html += '</div>';
      } else if (v.every(function(item) { return item === null || typeof item !== 'object'; })) {
        // Array de primitivos - exibe como lista separada por virgula
        html += '<div class="data-item" style="grid-column:1/-1;"><span class="data-label">' + escapeHtml(k) + '</span><span class="data-value">' + escapeHtml(v.join(', ')) + '</span></div>';
      } else {
        // Array misto - renderiza cada item recursivamente
        html += '<div class="data-item" style="grid-column:1/-1;"><span class="data-label">' + escapeHtml(k) + ' (' + v.length + ' itens)</span>';
        v.forEach(function(subItem, subIdx) {
          var subPath = propPath + '.' + subIdx;
          if (subItem !== null && typeof subItem === 'object') {
            html += '<div class="nested-object" data-json-path="' + escapeHtml(subPath) + '" style="margin-top:8px;">';
            html += '<div class="fieldset-title" style="font-size:13px;padding-bottom:6px;margin-bottom:10px;">Item ' + (subIdx + 1) + '</div>';
            html += renderGenericObject(subItem, k, subPath);
            html += '</div>';
          } else {
            html += '<div class="data-item" style="margin-top:4px;"><span class="data-label">[' + subIdx + ']</span>' + fmtVal(subItem, k) + '</div>';
          }
        });
        html += '</div>';
      }
    } else if (typeof v === 'object') {
      // Objeto aninhado - renderiza recursivamente dentro de nested-object
      html += '<div class="data-item" style="grid-column:1/-1;"><span class="data-label">' + escapeHtml(k) + '</span>';
      html += '<div class="nested-object" data-json-path="' + escapeHtml(propPath) + '">';
      html += renderGenericObject(v, k, propPath);
      html += '</div></div>';
    }
  });
  html += '</div>';
  return html;
}

function pickSummaryFields(o) {
  var candidates = [];
  var priorityKeys = ['id', 'name', 'title', 'status', 'total', 'amount', 'type', 'version'];
  priorityKeys.forEach(function(pk) {
    Object.keys(o).forEach(function(k) {
      if (k === '_id' || k === '_fileName') return;
      if (k.toLowerCase() === pk.toLowerCase() && o[k] !== null && o[k] !== undefined && typeof o[k] !== 'object') {
        candidates.push({key: k, value: o[k]});
      }
    });
  });
  Object.keys(o).forEach(function(k) {
    if (k === '_id' || k === '_fileName') return;
    var already = candidates.some(function(c) { return c.key === k; });
    if (!already && candidates.length < 8) {
      var v = o[k];
      if (typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean') {
        candidates.push({key: k, value: v});
      }
    }
  });
  if (candidates.length === 0) {
    var firstKey = Object.keys(o).find(function(k) { return k !== '_id' && k !== '_fileName'; });
    if (firstKey) {
      var firstVal = o[firstKey];
      if (Array.isArray(firstVal) && firstVal.length > 0 && typeof firstVal[0] === 'object') {
        candidates = pickSummaryFields(firstVal[0]);
        candidates.forEach(function(c) { c.key = firstKey + '[0].' + c.key; });
      } else if (typeof firstVal === 'object' && firstVal !== null) {
        candidates = pickSummaryFields(firstVal);
        candidates.forEach(function(c) { c.key = firstKey + '.' + c.key; });
      }
    }
  }
  return candidates.slice(0, 8);
}

function switchInnerTab(tabId) {
  document.querySelectorAll('.inner-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tabId);
  });
  document.querySelectorAll('.inner-content').forEach(function(c) {
    c.classList.toggle('active', c.dataset.content === tabId);
  });
  if (activeDocId && activeDocId !== '__new__') {
    activeInnerTabs[activeDocId] = tabId;
    saveState();
  }
  // Reativa duplo clique após troca de aba
  setTimeout(function() { setupDoubleClick(); }, 0);
}

function setupDropZone() {
  var dz = document.getElementById('dropZone');
  if (!dz) return;
  dz.addEventListener('click', function() { document.getElementById('fileInput').click(); });
  ['dragenter','dragover'].forEach(function(e) {
    dz.addEventListener(e, function(ev) { ev.preventDefault(); dz.classList.add('dragover'); });
  });
  ['dragleave','drop'].forEach(function(e) {
    dz.addEventListener(e, function(ev) { ev.preventDefault(); dz.classList.remove('dragover'); });
  });
  dz.addEventListener('drop', function(ev) {
    var files = ev.dataTransfer.files;
    if (files.length) addDocFromFile(files[0]);
  });
}

function handleFileSelect(e) {
  var file = e.target.files[0];
  if (file) addDocFromFile(file);
}

function exportReport(id) {
  var o = docs.find(function(x) { return x._id === id; });
  if (!o) return;
  var originalActive = activeDocId;
  activeDocId = id;
  renderContent();
  var container = document.getElementById('jsonContainer');
  if (!container) { activeDocId = originalActive; renderContent(); return; }
  var clone = container.cloneNode(true);
  clone.querySelectorAll('.export-bar, .actions-row, .stats-bar').forEach(function(el) { el.remove(); });
  clone.querySelectorAll('.inner-content').forEach(function(content) {
    content.classList.remove('active');
    content.style.display = '';
  });
  clone.querySelectorAll('.inner-tab').forEach(function(tab) {
    tab.classList.remove('active');
    tab.removeAttribute('onclick');
  });
  var firstTab = clone.querySelector('.inner-tab');
  var firstContent = clone.querySelector('.inner-content');
  if (firstTab) firstTab.classList.add('active');
  if (firstContent) {
    firstContent.classList.add('active');
    firstContent.style.display = 'block';
  }
  var reportTitle = 'Relatorio JSON \u2014 ' + getDocLabel(o);
  var now = new Date().toISOString();
  var cleanData = {};
  for (var k in o) { if (k !== '_id' && k !== '_fileName') cleanData[k] = o[k]; }
  var jsonData = JSON.stringify(cleanData, null, 2);
  var jsonBase64 = btoa(unescape(encodeURIComponent(jsonData)));

function getValueByPath(obj, path) {
  var parts = path.split('.');
  var current = obj;
  for (var i = 0; i < parts.length; i++) {
    if (current === null || current === undefined) return undefined;
    var key = parts[i];
    // Tenta como número (índice de array) primeiro
    var idx = parseInt(key, 10);
    if (!isNaN(idx) && Array.isArray(current)) {
      current = current[idx];
    } else {
      current = current[key];
    }
  }
  return current;
}
